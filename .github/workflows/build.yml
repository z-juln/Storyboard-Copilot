name: Build Video-Copilot

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (example: v0.1.0). Leave empty to skip release job.'
        required: false
        type: string
      release_notes:
        description: 'Release notes shown on GitHub Release. Optional when using tag push.'
        required: false
        type: string

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Update version
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '')
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            $VERSION = $env:GITHUB_REF -replace 'refs/tags/v', ''
          } elseif ("${{ github.event.inputs.release_tag }}" -like 'v*') {
            $VERSION = "${{ github.event.inputs.release_tag }}" -replace '^v', ''
          } else {
            throw "Invalid release_tag. Use format like v0.1.0"
          }
          node scripts/sync-version.mjs $VERSION

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npx tauri build

      - name: Rename Windows installer
        shell: pwsh
        run: |
          $RELEASE_APP_NAME = "Video-Copilot"
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            $VERSION = $env:GITHUB_REF -replace 'refs/tags/v', ''
          } elseif ("${{ github.event.inputs.release_tag }}" -like 'v*') {
            $VERSION = "${{ github.event.inputs.release_tag }}" -replace '^v', ''
          } else {
            $VERSION = (Get-Content package.json | ConvertFrom-Json).version
          }
          # Rename NSIS installer
          $NSIS_PATH = Get-ChildItem -Path "src-tauri/target/release/bundle/nsis/*.exe" | Select-Object -First 1
          if ($NSIS_PATH) {
            $NEW_NAME = "${RELEASE_APP_NAME}_${VERSION}_x64-setup.exe"
            $NEW_PATH = Join-Path (Split-Path $NSIS_PATH.FullName) $NEW_NAME
            Move-Item -Path $NSIS_PATH.FullName -Destination $NEW_PATH -Force
            Write-Host "Renamed to: $NEW_NAME"
          } else {
            throw "No NSIS installer found under src-tauri/target/release/bundle/nsis"
          }

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Update version
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '')
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          elif [[ "${{ github.event.inputs.release_tag }}" == v* ]]; then
            VERSION=${{ github.event.inputs.release_tag }}
            VERSION=${VERSION#v}
          else
            echo "Invalid release_tag. Use format like v0.1.0"
            exit 1
          fi
          node scripts/sync-version.mjs "$VERSION"

      - name: Install dependencies
        run: npm ci

      - name: Build application (Universal Binary)
        env:
          CC: ""
          CXX: ""
        run: npx tauri build --target universal-apple-darwin

      - name: Rename macOS DMG
        run: |
          RELEASE_APP_NAME="Video-Copilot"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          elif [[ "${{ github.event.inputs.release_tag }}" == v* ]]; then
            VERSION=${{ github.event.inputs.release_tag }}
            VERSION=${VERSION#v}
          else
            VERSION=$(node -p "require('./package.json').version")
          fi
          DMG_PATH=$(find src-tauri/target/universal-apple-darwin/release/bundle/dmg -name "*.dmg" | head -n 1)
          if [ -z "$DMG_PATH" ]; then
            echo "No DMG found under src-tauri/target/universal-apple-darwin/release/bundle/dmg"
            exit 1
          fi
          NEW_NAME="${RELEASE_APP_NAME}_${VERSION}_universal.dmg"
          NEW_PATH="$(dirname "$DMG_PATH")/$NEW_NAME"
          mv "$DMG_PATH" "$NEW_PATH"
          echo "Renamed to: $NEW_NAME"

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Upload macOS App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app
          if-no-files-found: warn

  release:
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '')
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve release metadata
        id: resolve_release
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="${{ github.event.inputs.release_tag }}"
          fi
          if [[ -z "$TAG" || "$TAG" != v* ]]; then
            echo "Invalid release tag: $TAG"
            exit 1
          fi

          NOTES_INPUT="${{ github.event.inputs.release_notes }}"
          if [[ -n "$NOTES_INPUT" ]]; then
            BODY="$NOTES_INPUT"
          else
            # Prefer annotated tag message so npm release notes show up in GitHub Releases.
            git fetch --force --tags >/dev/null 2>&1 || true
            TAG_TYPE="$(git cat-file -t "$TAG" 2>/dev/null || true)"
            if [[ "$TAG_TYPE" == "tag" ]]; then
              BODY="$(git cat-file -p "$TAG" | sed '1,/^$/d' | sed '/^[[:space:]]*$/d')"
            else
              BODY=""
            fi
          fi

          if [[ -z "$BODY" ]]; then
            BODY="$(git for-each-ref "refs/tags/$TAG" --format='%(contents)' | sed '/^[[:space:]]*$/d')"
          fi

          if [[ -z "$BODY" ]]; then
            BODY="Release $TAG"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          {
            echo "body<<EOF"
            echo "$BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: artifacts/windows

      - name: Download macOS DMG
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: artifacts/macos

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.resolve_release.outputs.tag }}
          target_commitish: ${{ github.sha }}
          body: ${{ steps.resolve_release.outputs.body }}
          files: |
            artifacts/windows/*.exe
            artifacts/macos/*.dmg
          draft: false
          prerelease: false
          generate_release_notes: false
